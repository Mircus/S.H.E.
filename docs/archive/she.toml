# ✅ Minimal `pyproject.toml`

```toml
[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "she"
version = "0.1.0"
description = "Simplicial Hyperstructure Engine (SHE): Higher-order data modeling with simplicial complexes and neural networks."
authors = [
  { name="Your Name", email="you@example.com" }
]
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENCE.md" }
dependencies = [
  "torch",
  "torch-geometric",
  "xgi",
  "toponetx",
  "giotto-tda",
  "gudhi",
  "networkx",
  "scipy",
  "numpy",
  "pandas",
  "matplotlib",
  "seaborn",
  "plotly",
  "streamlit"
]

[project.urls]
Homepage = "https://github.com/<your-org>/S.H.E."
Documentation = "https://github.com/<your-org>/S.H.E./tree/main/docs"
